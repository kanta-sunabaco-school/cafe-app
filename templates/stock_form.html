<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>入出庫登録</title>
</head>

<body>

<h1>入出庫登録</h1>

<form action="/stock/create" method="post">

<p>
商品：
<select name="product_id">

{% for product in products %}

<option value="{{ product.id }}"

{% if product.id == selected_product_id %}
selected
{% endif %}

>
{{ product.name }}
</option>

{% endfor %}

</select>
</p>

<p>
入出庫：
<select name="status_id">

{% for status in statuses %}
<option value="{{ status.id }}">
{{ status.status }}
</option>
{% endfor %}

</select>
</p>

<p>
数量：
<input type="number" name="quantity" required>
</p>

<p>
<button type="submit">
登録
</button>
</p>

</form>

<p>
<a href="/products">商品一覧へ</a>
</p>

</body>
</html>
