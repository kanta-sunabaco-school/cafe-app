<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>入出庫履歴</title>
</head>

<body>

<h1>入出庫履歴</h1>

<p>
<a href="/stock/new">
入出庫登録
</a>
</p>

<table border="1">

<tr>
<th>ID</th>
<th>商品</th>
<th>入出庫</th>
<th>数量</th>
<th>日時</th>
</tr>

{% for log in logs %}
<tr>

<td>{{ log.id }}</td>

<td>{{ log.product_name }}</td>

<td>{{ log.status }}</td>

<td>{{ log.quantity }}</td>

<td>{{ log.datetime }}</td>

</tr>
{% endfor %}

</table>

</body>
</html>
